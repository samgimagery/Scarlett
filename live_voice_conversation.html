<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Scarlett</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, system-ui, 'SF Pro Display', sans-serif;
  background: #f5f0e8;
  color: #1a1a1a;
  min-height: 100vh;
  min-height: 100dvh;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  position: relative;
}

/* Canvas — particles emerge from circle */
#particleCanvas {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
}

/* Central circle */
#circleWrap {
  position: fixed;
  z-index: 10;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  transition: top 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  cursor: pointer;
}

#circleWrap.active {
  top: 65%;
}

.circle {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: #1a1a1a;
  position: relative;
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1),
              box-shadow 0.6s ease,
              width 0.4s ease,
              height 0.4s ease;
}

.circle:active {
  transform: scale(0.95);
}

/* Ring around circle */
.circle-ring {
  position: absolute;
  inset: -10px;
  border-radius: 50%;
  border: 1.5px solid rgba(26, 26, 26, 0.15);
  opacity: 0;
  transition: opacity 0.5s, border-color 0.5s, transform 0.5s;
  pointer-events: none;
}

/* Glow behind circle */
.circle-glow {
  position: absolute;
  inset: -40px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(26, 26, 26, 0.06) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.8s;
  pointer-events: none;
}

/* State: idle */
.circle.idle .circle-ring { opacity: 0.2; animation: breathe 5s ease-in-out infinite; }
.circle.idle .circle-glow { opacity: 0.3; }

/* State: live (call active, listening) */
.circle.live .circle-ring { opacity: 0.4; animation: breathe 4s ease-in-out infinite; }
.circle.live .circle-glow { opacity: 0.5; }
.circle.live { box-shadow: 0 0 30px rgba(26, 26, 26, 0.08); }

/* State: hearing */
.circle.hearing .circle-ring { opacity: 0.7; animation: pulse 0.8s ease-in-out infinite; border-color: rgba(26, 26, 26, 0.4); }
.circle.hearing .circle-glow { opacity: 0.7; }
.circle.hearing { box-shadow: 0 0 40px rgba(26, 26, 26, 0.12); transform: scale(1.05); }

/* State: thinking */
.circle.thinking .circle-ring { opacity: 0.5; animation: spin 3s linear infinite; border-style: dashed; border-color: rgba(26, 26, 26, 0.3); }
.circle.thinking .circle-glow { opacity: 0.6; }
.circle.thinking { transform: scale(0.97); }

/* State: speaking */
.circle.speaking .circle-ring { opacity: 0.6; animation: breathe 1.2s ease-in-out infinite; border-color: rgba(26, 26, 26, 0.35); }
.circle.speaking .circle-glow { opacity: 0.8; }
.circle.speaking { box-shadow: 0 0 50px rgba(26, 26, 26, 0.1); transform: scale(1.08); }

@keyframes breathe {
  0%, 100% { transform: scale(1); opacity: 0.2; }
  50% { transform: scale(1.04); opacity: 0.5; }
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.4; }
  50% { transform: scale(1.1); opacity: 0.9; }
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* Transcript — minimal, below circle */
.transcript {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 0.02em;
  color: rgba(26, 26, 26, 0.5);
  max-width: 70vw;
  text-align: center;
  line-height: 1.6;
  opacity: 0;
  transition: opacity 0.5s;
  pointer-events: none;
}
.transcript.visible { opacity: 1; }
.transcript.user { font-style: italic; color: rgba(26, 26, 26, 0.35); }

/* Debug — subtle, top-left */
#debugPanel {
  position: fixed;
  top: 8px;
  left: 8px;
  z-index: 40;
  font-family: 'SF Mono', Menlo, monospace;
  font-size: 9px;
  color: rgba(26, 26, 26, 0.2);
  line-height: 1.6;
  pointer-events: none;
  max-width: 50vw;
  overflow: hidden;
}

/* Disconnect button */
#disconnectBtn {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 20;
  background: transparent;
  border: 1px solid rgba(26, 26, 26, 0.15);
  color: rgba(26, 26, 26, 0.3);
  font-size: 9px;
  font-weight: 400;
  font-family: -apple-system, system-ui, sans-serif;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 6px 14px;
  border-radius: 20px;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.5s, border-color 0.3s, color 0.3s;
}
#disconnectBtn.visible { opacity: 1; }
#disconnectBtn:hover { border-color: rgba(26, 26, 26, 0.4); color: rgba(26, 26, 26, 0.6); }

/* Node tooltip — clean cream card */
#tooltip {
  position: fixed;
  background: rgba(245, 240, 232, 0.95);
  border: 1px solid rgba(26, 26, 26, 0.1);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 10px;
  font-family: 'SF Mono', Menlo, monospace;
  color: rgba(26, 26, 26, 0.6);
  max-width: 260px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
  z-index: 50;
  line-height: 1.5;
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
  backdrop-filter: blur(10px);
}
.tt-path { color: rgba(26, 26, 26, 0.4); font-size: 8px; margin-bottom: 3px; word-break: break-all; }
.tt-score { color: rgba(26, 26, 26, 0.3); font-size: 8px; margin-bottom: 5px; }
.tt-snippet { color: rgba(26, 26, 26, 0.55); font-size: 9px; }
</style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<div id="circleWrap">
  <div class="circle-glow" id="glow"></div>
  <div class="circle-ring" id="ring"></div>
  <div class="circle idle" id="circle"></div>
</div>

<div class="transcript" id="transcriptLine"></div>
<button id="disconnectBtn">end</button>
<div id="debugPanel"></div>

<div id="tooltip">
  <div class="tt-path" id="ttPath"></div>
  <div class="tt-score" id="ttScore"></div>
  <div class="tt-snippet" id="ttSnippet"></div>
</div>

<script>
// === Debug ===
const Debug = {
  el: null,
  lines: [],
  init() { this.el = document.getElementById('debugPanel'); },
  log(msg) {
    this.lines.push(msg);
    if (this.lines.length > 8) this.lines.shift();
    if (this.el) this.el.textContent = this.lines.join('\n');
  }
};

// === Particle System ===
const Particles = {
  canvas: null,
  ctx: null,
  width: 0,
  height: 0,
  particles: [],
  raf: null,
  audioIntensity: 0,
  circleX: 0,
  circleY: 0,
  nodeResults: [],

  init() {
    this.canvas = document.getElementById('particleCanvas');
    this.ctx = this.canvas.getContext('2d');
    this.resize();
    window.addEventListener('resize', () => this.resize());
  },

  resize() {
    this.width = window.innerWidth;
    this.height = window.innerHeight;
    this.canvas.width = this.width * devicePixelRatio;
    this.canvas.height = this.height * devicePixelRatio;
    this.canvas.style.width = this.width + 'px';
    this.canvas.style.height = this.height + 'px';
    this.ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    this._updateCirclePos();
  },

  _updateCirclePos() {
    const wrap = document.getElementById('circleWrap');
    if (!wrap) return;
    const rect = wrap.getBoundingClientRect();
    this.circleX = rect.left + rect.width / 2;
    this.circleY = rect.top + rect.height / 2;
  },

  // Spawn particles that emerge from the circle when speaking
  spawnFromCircle(count, type) {
    this._updateCirclePos();
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 0.3 + Math.random() * 1.2;
      const r = 40; // start at circle edge
      this.particles.push({
        x: this.circleX + Math.cos(angle) * r,
        y: this.circleY + Math.sin(angle) * r,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.003 + Math.random() * 0.008,
        size: 1.5 + Math.random() * 2.5,
        type: type || 'audio', // 'audio' or 'node'
      });
    }
  },

  // Spawn a node particle (from RAG results)
  spawnNode(node) {
    this._updateCirclePos();
    const angle = Math.random() * Math.PI * 2;
    const dist = 60 + Math.random() * 120;
    const targetX = this.circleX + Math.cos(angle) * dist;
    const targetY = this.circleY + Math.sin(angle) * dist;

    this.particles.push({
      x: this.circleX + Math.cos(angle) * 40,
      y: this.circleY + Math.sin(angle) * 40,
      vx: (targetX - this.circleX) * 0.008,
      vy: (targetY - this.circleY) * 0.008,
      life: 1,
      decay: 0.0015 + Math.random() * 0.002,
      size: 3 + (node.score || 0.5) * 4,
      type: 'node',
      label: (node.path || '').split('/').pop().replace(/\.md$/i, '').slice(0, 12),
      score: node.score || 0.5,
      settled: false,
      settleX: targetX,
      settleY: targetY,
    });
  },

  onAudio(intensity) {
    this.audioIntensity = intensity;
    // Spawn particles proportional to audio intensity
    if (intensity > 0.1) {
      const count = Math.floor(intensity * 3);
      this.spawnFromCircle(count, 'audio');
    }
  },

  setResults(results) {
    this.nodeResults = results || [];
    // Spawn node particles for each result
    this.nodeResults.forEach(n => this.spawnNode(n));
  },

  clearNodes() {
    // Mark all node particles for fast decay
    this.particles.forEach(p => {
      if (p.type === 'node') p.decay = 0.02;
    });
  },

  start() {
    if (this.raf) return;
    const loop = () => {
      this._updateCirclePos();
      this._draw();
      this.raf = requestAnimationFrame(loop);
    };
    loop();
  },

  stop() {
    // Don't stop the loop — just stop audio-driven spawns
    this.audioIntensity = 0;
  },

  _draw() {
    const ctx = this.ctx;
    ctx.clearRect(0, 0, this.width, this.height);

    // Draw lines between nearby node particles
    const nodeParticles = this.particles.filter(p => p.type === 'node' && p.life > 0.1);
    for (let i = 0; i < nodeParticles.length; i++) {
      for (let j = i + 1; j < nodeParticles.length; j++) {
        const dx = nodeParticles[i].x - nodeParticles[j].x;
        const dy = nodeParticles[i].y - nodeParticles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 150) {
          const alpha = (1 - dist / 150) * 0.1 * Math.min(nodeParticles[i].life, nodeParticles[j].life);
          ctx.beginPath();
          ctx.moveTo(nodeParticles[i].x, nodeParticles[i].y);
          ctx.lineTo(nodeParticles[j].x, nodeParticles[j].y);
          ctx.strokeStyle = `rgba(26, 26, 26, ${alpha})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }

    // Draw lines from circle to nearby node particles
    for (const p of nodeParticles) {
      const dx = p.x - this.circleX;
      const dy = p.y - this.circleY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 200) {
        const alpha = (1 - dist / 200) * 0.08 * p.life;
        ctx.beginPath();
        ctx.moveTo(this.circleX, this.circleY);
        ctx.lineTo(p.x, p.y);
        ctx.strokeStyle = `rgba(26, 26, 26, ${alpha})`;
        ctx.lineWidth = 0.4;
        ctx.stroke();
      }
    }

    // Update and draw particles
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];

      // Node particles: drift toward settle point, then slow down
      if (p.type === 'node') {
        if (!p.settled) {
          p.x += p.vx;
          p.y += p.vy;
          const dx = p.settleX - p.x;
          const dy = p.settleY - p.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 2) {
            p.settled = true;
            p.vx = 0;
            p.vy = 0;
          }
        } else {
          // Gentle drift when settled
          p.x += Math.sin(Date.now() * 0.001 + i) * 0.05;
          p.y += Math.cos(Date.now() * 0.0012 + i) * 0.05;
        }
      } else {
        // Audio particles: drift outward
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.99;
        p.vy *= 0.99;
      }

      p.life -= p.decay;
      if (p.life <= 0) {
        this.particles.splice(i, 1);
        continue;
      }

      const alpha = p.life * (p.type === 'node' ? 0.7 : 0.4);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * (p.type === 'node' ? 1 : p.life), 0, Math.PI * 2);

      if (p.type === 'node') {
        ctx.fillStyle = `rgba(26, 26, 26, ${alpha * 0.15})`;
        ctx.fill();
        ctx.strokeStyle = `rgba(26, 26, 26, ${alpha * 0.5})`;
        ctx.lineWidth = 0.8;
        ctx.stroke();

        // Label
        if (p.label && p.life > 0.3 && p.settled) {
          ctx.font = '7px -apple-system, system-ui, sans-serif';
          ctx.fillStyle = `rgba(26, 26, 26, ${alpha * 0.4})`;
          ctx.textAlign = 'center';
          ctx.letterSpacing = '0.05em';
          ctx.fillText(p.label.toUpperCase(), p.x, p.y + p.size + 10);
        }
      } else {
        ctx.fillStyle = `rgba(26, 26, 26, ${alpha})`;
        ctx.fill();
      }
    }

    // Cap particle count
    if (this.particles.length > 500) {
      this.particles.splice(0, this.particles.length - 500);
    }
  }
};

// === Audio Engine ===
const AudioEngine = {
  ctx: null,
  queue: [],
  isPlaying: false,
  currentSource: null,
  analyser: null,
  initialized: false,
  decodeOk: false,

  async init() {
    if (this.initialized) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) { Debug.log('No Web Audio'); return; }
    this.ctx = new AC({ sampleRate: 24000 });
    this.initialized = true;
    Debug.log('AudioContext: ' + this.ctx.state);
  },

  async resume() {
    if (!this.ctx) await this.init();
    if (this.ctx.state === 'suspended') {
      try {
        await this.ctx.resume();
      } catch(e) { Debug.log('Resume failed: ' + e.message); }
    }
  },

  stop() {
    if (this.currentSource) { try { this.currentSource.stop(); } catch(e) {} }
    this.currentSource = null;
    this.queue = [];
    this.isPlaying = false;
    this.analyser = null;
    Particles.stop();
  },

  parseWavPcm(wavBytes) {
    const view = new DataView(wavBytes);
    if (view.getUint32(0, true) !== 0x46464952) return null;
    if (view.getUint32(8, true) !== 0x45564157) return null;

    let offset = 12;
    let dataOffset = -1, dataSize = 0;
    let channels = 1, sampleRate = 24000, bitsPerSample = 16;

    while (offset < view.byteLength - 8) {
      const id = view.getUint32(offset, true);
      const size = view.getUint32(offset + 4, true);
      if (id === 0x20746D66) {
        const fmtOffset = offset + 8;
        channels = view.getUint16(fmtOffset + 2, true);
        sampleRate = view.getUint32(fmtOffset + 4, true);
        bitsPerSample = view.getUint16(fmtOffset + 14, true);
      } else if (id === 0x61746164) {
        dataOffset = offset + 8;
        dataSize = size;
        break;
      }
      offset += 8 + size;
    }

    if (dataOffset < 0) return null;
    const bytesPerSample = bitsPerSample / 8;
    const numSamples = dataSize / bytesPerSample;
    const pcm = new Float32Array(numSamples);

    if (bitsPerSample === 16) {
      for (let i = 0; i < numSamples; i++) {
        pcm[i] = view.getInt16(dataOffset + i * 2, true) / 32768;
      }
    } else if (bitsPerSample === 32) {
      for (let i = 0; i < numSamples; i++) {
        pcm[i] = view.getFloat32(dataOffset + i * 4, true);
      }
    }

    return { pcm, sampleRate, channels };
  },

  async enqueue(wavBytes) {
    if (!this.ctx) await this.init();
    await this.resume();

    const buf = wavBytes.slice(0);
    let audioBuffer = null;

    if (this.decodeOk !== false) {
      try {
        audioBuffer = await new Promise((resolve, reject) => {
          this.ctx.decodeAudioData(buf, resolve, reject);
        });
        this.decodeOk = true;
      } catch(e) {
        this.decodeOk = false;
      }
    }

    if (!audioBuffer) {
      const parsed = this.parseWavPcm(buf);
      if (parsed) {
        const { pcm, sampleRate, channels } = parsed;
        audioBuffer = this.ctx.createBuffer(channels, pcm.length / channels, sampleRate);
        if (channels === 1) {
          audioBuffer.getChannelData(0).set(pcm);
        } else {
          for (let ch = 0; ch < channels; ch++) {
            const chData = new Float32Array(pcm.length / channels);
            for (let i = 0; i < chData.length; i++) {
              chData[i] = pcm[i * channels + ch];
            }
            audioBuffer.getChannelData(ch).set(chData);
          }
        }
      } else {
        Debug.log('WAV parse failed');
        return;
      }
    }

    this.queue.push(audioBuffer);
    if (!this.isPlaying) this._playNext();
  },

  enqueuePCM(int16Data, sampleRate) {
    /* Play raw int16 PCM data with minimal latency.
       Used for streaming CSM chunks — 80ms frames arrive as they generate. */
    if (!this.ctx) return;
    const numSamples = int16Data.length;
    const audioBuffer = this.ctx.createBuffer(1, numSamples, sampleRate || 24000);
    const channelData = audioBuffer.getChannelData(0);
    for (let i = 0; i < numSamples; i++) {
      channelData[i] = int16Data[i] / 32768;
    }
    this.queue.push(audioBuffer);
    if (!this.isPlaying) this._playNext();
  },

  _playNext() {
    if (this.queue.length === 0) {
      this.isPlaying = false;
      this.currentSource = null;
      this.analyser = null;
      Particles.stop();
      if (callActive) setCircleState('live');
      return;
    }
    this.isPlaying = true;
    const buffer = this.queue.shift();
    const source = this.ctx.createBufferSource();
    source.buffer = buffer;
    this.currentSource = source;

    this.analyser = this.ctx.createAnalyser();
    this.analyser.fftSize = 256;
    this.analyser.smoothingTimeConstant = 0.6;

    source.connect(this.analyser);
    this.analyser.connect(this.ctx.destination);

    source.onended = () => {
      this.currentSource = null;
      this._playNext();
    };
    source.start(0);
    this._startViz(this.analyser);
  },

  _startViz(analyser) {
    const data = new Uint8Array(analyser.frequencyBinCount);

    const loop = () => {
      if (!this.analyser || this.analyser !== analyser) return;
      analyser.getByteFrequencyData(data);
      let sum = 0, count = 0;
      for (let i = 2; i < 40; i++) { sum += data[i]; count++; }
      const avg = sum / count / 255;
      Particles.onAudio(avg);
      requestAnimationFrame(loop);
    };
    loop();
  }
};

// === State ===
let currentState = 'idle';
function setCircleState(state) {
  currentState = state;
  const circle = document.getElementById('circle');
  const wrap = document.getElementById('circleWrap');
  circle.className = 'circle ' + state;

  if (state === 'live' || state === 'hearing' || state === 'thinking' || state === 'speaking') {
    wrap.classList.add('active');
  } else {
    wrap.classList.remove('active');
  }
}

// === WebSocket ===
let ws = null;
let connected = false;
let callActive = false;

function connect() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = `${protocol}//${location.host}`;
  ws = new WebSocket(url);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    connected = true;
    Debug.log('WS connected');
    if (!callActive) setCircleState('idle');
  };

  ws.onmessage = async (e) => {
    if (e.data instanceof ArrayBuffer) {
      const data = new DataView(e.data);
      if (data.byteLength >= 12) {
        const msgType = data.getUint32(0);
        const dataLen = data.getUint32(4);
        const sampleRate = data.getUint32(8);
        if (msgType === 1 && data.byteLength >= 12 + dataLen) {
          // Streaming PCM chunk (type=1): header + int16 audio data
          const int16 = new Int16Array(e.data, 12, dataLen / 2);
          AudioEngine.enqueuePCM(int16, sampleRate);
        } else {
          // Legacy WAV file
          await AudioEngine.enqueue(e.data);
        }
      } else {
        // Short binary — probably WAV
        await AudioEngine.enqueue(e.data);
      }
      return;
    }
    try {
      const msg = JSON.parse(e.data);
      handleMessage(msg);
    } catch(err) {
      Debug.log('WS parse: ' + err.message);
    }
  };

  ws.onclose = () => {
    connected = false;
    Debug.log('WS closed');
    if (callActive) endCall();
    setCircleState('idle');
    setTimeout(connect, 2500);
  };

  ws.onerror = () => { connected = false; };
}

function handleMessage(msg) {
  Debug.log(msg.type + (msg.filler ? ' (filler)' : ''));
  switch (msg.type) {
    case 'state':
      if (msg.state === 'listening' && callActive) setCircleState('live');
      else setCircleState(msg.state);
      break;
    case 'transcript':
      showTranscript('"' + msg.text + '"', true);
      setCircleState('thinking');
      break;
    case 'nodes':
      Particles.setResults(msg.results || []);
      break;
    case 'reply':
      showTranscript(msg.text, false);
      break;
    case 'audio_info':
      if (!msg.filler) setCircleState('speaking');
      break;
    case 'audio_chunk':
      break;
    case 'audio_done':
      if (!AudioEngine.isPlaying) setCircleState('live');
      Particles.clearNodes();
      break;
    case 'barge_in':
      AudioEngine.stop();
      Particles.clearNodes();
      setCircleState('hearing');
      break;
  }
}

function showTranscript(text, isUser) {
  const el = document.getElementById('transcriptLine');
  el.textContent = isUser ? '"' + text + '"' : text;
  el.className = 'transcript visible' + (isUser ? ' user' : '');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('visible'), isUser ? 4000 : 8000);
}

// === Mic ===
let micStream = null;
let micSource = null;
let micCtx = null;
let processor = null;

async function startCall() {
  if (callActive) return;

  try {
    await AudioEngine.init();
    await AudioEngine.resume();

    micStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        sampleRate: 16000,
        channelCount: 1,
        echoCancellation: true,
        noiseSuppression: true
      }
    });

    micCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
    micSource = micCtx.createMediaStreamSource(micStream);

    processor = micCtx.createScriptProcessor(2048, 1, 1);
    processor.onaudioprocess = (e) => {
      if (!callActive || !ws || ws.readyState !== WebSocket.OPEN) return;
      const f32 = e.inputBuffer.getChannelData(0);
      const i16 = new Int16Array(f32.length);
      for (let i = 0; i < f32.length; i++) {
        const s = Math.max(-1, Math.min(1, f32[i]));
        i16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
      }
      ws.send(i16.buffer);
    };
    micSource.connect(processor);
    processor.connect(micCtx.destination);

    callActive = true;
    document.getElementById('disconnectBtn').classList.add('visible');
    setCircleState('live');
    Debug.log('Mic active');

  } catch (e) {
    Debug.log('Mic: ' + e.message);
  }
}

function endCall() {
  callActive = false;
  AudioEngine.stop();
  Particles.clearNodes();

  if (micStream) micStream.getTracks().forEach(t => t.stop());
  if (micSource) micSource.disconnect();
  if (processor) processor.disconnect();
  if (micCtx) { micCtx.close(); micCtx = null; }

  micStream = null;
  micSource = null;
  processor = null;

  document.getElementById('disconnectBtn').classList.remove('visible');
  document.getElementById('transcriptLine').classList.remove('visible');
  setCircleState('idle');
}

// === Controls ===
document.getElementById('circle').addEventListener('click', () => {
  if (!callActive) startCall();
});
document.getElementById('disconnectBtn').addEventListener('click', endCall);

// === Boot ===
Debug.init();
Particles.init();
Particles.start();
connect();
</script>
